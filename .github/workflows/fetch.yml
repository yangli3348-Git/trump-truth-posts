name: Fetch Trump Truth Social Posts

on:
  schedule:
    - cron: '*/15 * * * *'    # 每15分钟
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install deps
        run: pip install requests

      - name: Fetch posts
        run: python fetch.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/truth_posts.json
          git diff --cached --quiet || (git commit -m "[bot] Trump posts $(TZ='America/New_York' date '+%m-%d %H:%M')" && git push)
